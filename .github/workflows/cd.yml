name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    
      - name: Checkout Repository
        uses: actions/checkout@v4

     
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

     
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Images
        run: |
          docker compose build
          docker tag fastapi_app mukulnagar25/fastapi-app:latest
          docker tag celery_worker mukulnagar25/fastapi-worker:latest
          docker push mukulnagar25/fastapi-app:latest
          docker push mukulnagar25/fastapi-worker:latest

  