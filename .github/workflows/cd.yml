name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # :one: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # :two: Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # :three: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # :four: Build and push images
      - name: Build and Push Images
        run: |
          docker compose build
          docker tag fastapi_app mukulnagar25/fastapi-app1:latest
          docker tag celery_worker mukulnagar25/fastapi-worker1:latest
          docker push mukulnagar25/fastapi-app1:latest
          docker push mukulnagar25/fastapi-worker1:latest

  