name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # :one: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # :two: Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # :three: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # :four: Build and push images
      - name: Build and Push Images
        run: |
          docker compose build
          docker tag fastapi_app mukulnagar25/fastapi-app1:latest
          docker tag celery_worker mukulnagar25/fastapi-worker1:latest
          docker push mukulnagar25/fastapi-app1:latest
          docker push mukulnagar25/fastapi-worker1:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/resume-analyzer
            git pull origin main
            docker compose pull fastapi celery
            docker compose up -d
            docker compose run --rm fastapi alembic upgrade head