name: CI

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 12345678
          POSTGRES_DB: resume_db1
        ports:
          - 5432:5432

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Start DB + broker
        run: docker compose up -d postgres redis

      - name: Run Alembic migrations
        run: docker compose run --rm fastapi alembic upgrade head

      - name: Run tests inside fastapi container
        run: docker compose run --rm fastapi pytest --maxfail=1 --disable-warnings -q
